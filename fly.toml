# fly.toml app configuration file generated for numbers-iuh-eq
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'numbers-iuh-eq'
primary_region = 'fra'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
